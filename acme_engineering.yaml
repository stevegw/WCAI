# ═══════════════════════════════════════════════════════════════════
# WCAI -- Windchill Config AI -- Company Configuration
# ═══════════════════════════════════════════════════════════════════
# This YAML file is the single source of truth for your company's
# Windchill setup. Define it once, version-control
# it, and use the CLI tool to generate all deployment artifacts.
#
# Run:  python -m wc_config.cli wizard        (interactive setup)
#       python -m wc_config.cli generate      (from this file)
#       python -m wc_config.cli validate      (check before deploy)
#       python -m wc_config.cli deploy --dry   (preview deployment)
# ═══════════════════════════════════════════════════════════════════

# ─── Company & Windchill Context ─────────────────────────────────
company:
  name: "Acme Engineering"
  org: "AcmeOrg"                    # Windchill OrgContainer name
  site: "acme-wc-prod"             # Windchill site identifier
  context_level: "organization"     # Where config is deployed: site | organization
  lock_preferences: true            # Lock prefs to prevent lower-context overrides
  use_flexible_change: true         # Windchill 11.2+ flexible change items

# ─── Groups / Departments ───────────────────────────────────────
groups:
  - id: eng
    name: "Engineering"
    description: "Product engineering and design team"

  - id: mfg
    name: "Manufacturing"
    description: "Manufacturing engineering and production"

  - id: qa
    name: "Quality Assurance"
    description: "Quality and compliance team"

  - id: mgmt
    name: "Management"
    description: "Engineering and program management"

