# ─── Role Assignments ───────────────────────────────────────────
# Maps Windchill change management roles to your people.
# Multiple people can share a role; one person can hold many roles.
#
# Available roles:
#   change_admin_1    - Manages PRs and CR analysis
#   change_admin_2    - Creates CNs, manages CRB, audits
#   change_admin_3    - Oversees CN execution and release
#   change_impl       - Executes implementation plan tasks
#   change_review_board - Reviews and approves/rejects CRs
#   pr_author         - Creates and submits problem reports
#   cr_author         - Creates and submits change requests
#   assignee          - Assigned to change notice tasks
#   reviewer          - Reviews change notice task deliverables
roles:
  change_admin_1:
    - jsmith
  change_admin_2:
    - tpatel
  change_admin_3:
    - rjones
  change_impl:
    - bwilson
    - mchen
  change_review_board:
    - tpatel
    - rjones
    - dkim
  pr_author:
    - jsmith
    - bwilson
    - mchen
    - dkim
  cr_author:
    - jsmith
    - tpatel
  assignee:
    - bwilson
    - mchen
  reviewer:
    - dkim

# ─── Change Management Preferences ──────────────────────────────
# These map directly to Windchill Preference Management settings.
# Values: "Yes" or "No"
preferences:
  cn_without_cr: "No"               # Change Notices without Change Requests
  auto_cn_creation: "No"            # Automatic Change Notice Creation
  sequenced_plan: "Yes"             # Sequenced Plan Execution Order
  cr_to_cn_cardinality: "No"        # Many CRs to many CNs
  cr_to_pr_cardinality: "No"        # Many CRs to many PRs
  optional_review: "No"             # Change task without review
  info_propagation: "Yes"           # Propagate data PR→CR→CN
  affected_end_items: "Yes"         # Show affected end items table

# ─── Change Association Rules ───────────────────────────────────
# Controls which change objects can be linked together.
# PTC recommends disabling OOB rules and defining only what you need.
associations:
  pr_to_cr:
    enabled: true
    cardinality: "many:1"
    owning_role: "cr"               # Role B owns the link
    required_role: "none"

  cr_to_cn:
    enabled: true
    cardinality: "many:1"
    owning_role: "cn"
    required_role: "none"

  cn_to_task:
    enabled: true
    cardinality: "1:many"
    owning_role: "cn"
    required_role: "none"

  pr_to_cn:                          # Direct shortcut (non-standard)
    enabled: false
    cardinality: "many:1"
    owning_role: "cn"
    required_role: "none"

# ─── Business Rules ─────────────────────────────────────────────
# Pre-release validation rules applied to changeables before release.
business_rules:
  rule_set_name: "ACME_PRE_RELEASE"
  rules:
    - key: "ACME_CHECKOUT_RULE"
      selector: "CHECKOUT_RULE"
      description: "Fails if changeable is checked out"
      block_number: 1

    - key: "ACME_RELEASE_TARGET_RULE"
      selector: "RELEASE_TARGET_RULE"
      description: "Validates change transition from source to destination state"
      block_number: 10

